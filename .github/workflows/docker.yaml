name: Docker Build and Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  CARGO_TERM_COLOR: always

jobs:
  build-crates:
    name: Install requirements and build crates from scratch
    runs-on: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Rust build cache
        uses: actions/cache@v4
        with:
          path: |
            .cargo/
            .rustup/
            target/
          key: ${{ runner.os }}-build-crates-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-build-crates-

      - name: Build crates from scratch (Debian 12 + rustup)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cargo .rustup
          docker run --rm \
            -v "$PWD":/work \
            -w /work \
            -e CARGO_HOME=/work/.cargo \
            -e RUSTUP_HOME=/work/.rustup \
            debian:12 \
            bash -lc '
              set -euo pipefail
              apt-get update
              env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                build-essential \
                curl \
                clang \
                cmake \
                pkg-config \
                libssl-dev \
                protobuf-compiler \
                ca-certificates
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain 1.92.0
              . "$CARGO_HOME/env"
              cargo --version
              cargo clean
              cargo build --release --bins
            '
      - name: Package built binaries
        shell: bash
        run: |
          set -euo pipefail
          BIN_DIR=""
          if compgen -G "target/release/revolt-*" >/dev/null; then
            BIN_DIR="target/release"
          elif compgen -G "target/debug/revolt-*" >/dev/null; then
            BIN_DIR="target/debug"
          else
            echo "No built revolt-* binaries found under target/release or target/debug"
            exit 1
          fi
          echo "Packaging binaries from ${BIN_DIR}"
          mkdir -p ci-bin
          install -m 0755 "${BIN_DIR}"/revolt-* ci-bin/
      - name: Upload crate binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: crate-binaries
          path: ci-bin/
          if-no-files-found: error

  build-pr:
    name: Build Docker images (no push)
    if: github.event_name == 'pull_request'
    needs:
      - build-crates
    runs-on: [ubuntu-latest]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: base
            dockerfile: Dockerfile
          - image_name: api
            dockerfile: crates/delta/Dockerfile
          - image_name: events
            dockerfile: crates/bonfire/Dockerfile
          - image_name: file-server
            dockerfile: crates/services/autumn/Dockerfile
          - image_name: proxy
            dockerfile: crates/services/january/Dockerfile
          - image_name: gifbox
            dockerfile: crates/services/gifbox/Dockerfile
          - image_name: crond
            dockerfile: crates/daemons/crond/Dockerfile
          - image_name: pushd
            dockerfile: crates/daemons/pushd/Dockerfile
          - image_name: voice-ingress
            dockerfile: crates/daemons/voice-ingress/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built crate binaries
        uses: actions/download-artifact@v4
        with:
          name: crate-binaries
          path: ci-bin/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,scope=${{ matrix.image_name }},mode=max

  publish:
    name: Publish Docker images
    if: github.event_name != 'pull_request'
    needs:
      - build-crates
    runs-on: [ubuntu-latest]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: base
            dockerfile: Dockerfile
          - image_name: api
            dockerfile: crates/delta/Dockerfile
          - image_name: events
            dockerfile: crates/bonfire/Dockerfile
          - image_name: file-server
            dockerfile: crates/services/autumn/Dockerfile
          - image_name: proxy
            dockerfile: crates/services/january/Dockerfile
          - image_name: gifbox
            dockerfile: crates/services/gifbox/Dockerfile
          - image_name: crond
            dockerfile: crates/daemons/crond/Dockerfile
          - image_name: pushd
            dockerfile: crates/daemons/pushd/Dockerfile
          - image_name: voice-ingress
            dockerfile: crates/daemons/voice-ingress/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built crate binaries
        uses: actions/download-artifact@v4
        with:
          name: crate-binaries
          path: ci-bin/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,scope=${{ matrix.image_name }},mode=max
