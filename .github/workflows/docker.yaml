name: Docker Build and Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  CARGO_TERM_COLOR: always

jobs:
  build-crates:
    name: Install requirements and build crates from scratch
    runs-on: [self-hosted, cs-003]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system build dependencies
        shell: bash
        run: |
          set -euo pipefail

          missing_tools=()
          for tool in cc pkg-config clang cmake protoc; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              missing_tools+=("$tool")
            fi
          done

          if [ "${#missing_tools[@]}" -eq 0 ]; then
            echo "Required build tools already installed"
          else
            if ! command -v apt-get >/dev/null 2>&1; then
              echo "Missing tools: ${missing_tools[*]}"
              echo "apt-get is unavailable on this runner; install dependencies manually"
              exit 1
            fi

            if [ "$(id -u)" -eq 0 ]; then
              SUDO=""
            elif command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
              SUDO="sudo -n"
            else
              echo "Missing tools: ${missing_tools[*]}"
              echo "Runner user has no passwordless sudo. Preinstall dependencies on cs-003 or configure NOPASSWD sudo for the runner user."
              exit 1
            fi

            $SUDO apt-get update
            $SUDO env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              build-essential \
              gcc \
              g++ \
              pkg-config \
              clang \
              cmake \
              libssl-dev \
              protobuf-compiler \
              ca-certificates
          fi

          cc --version

      - name: Setup Mise
        uses: immich-app/devtools/actions/use-mise@cd24790a7f5f6439ac32cc94f5523cb2de8bfa8c # use-mise-action-v1.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain and requirements
        run: mise install

      - name: Build crates from scratch
        shell: bash
        run: |
          set -euo pipefail
          cargo clean
          mise build

      - name: Package built binaries
        shell: bash
        run: |
          set -euo pipefail

          BIN_DIR=""
          if compgen -G "target/release/revolt-*" >/dev/null; then
            BIN_DIR="target/release"
          elif compgen -G "target/debug/revolt-*" >/dev/null; then
            BIN_DIR="target/debug"
          else
            echo "No built revolt-* binaries found under target/release or target/debug"
            exit 1
          fi

          echo "Packaging binaries from ${BIN_DIR}"
          mkdir -p ci-bin
          install -m 0755 "${BIN_DIR}"/revolt-* ci-bin/

      - name: Upload crate binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: crate-binaries
          path: ci-bin/
          if-no-files-found: error

  build-pr:
    name: Build Docker images (no push)
    if: github.event_name == 'pull_request'
    needs:
      - build-crates
    runs-on: [self-hosted, cs-003]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: base
            dockerfile: Dockerfile
          - image_name: api
            dockerfile: crates/delta/Dockerfile
          - image_name: events
            dockerfile: crates/bonfire/Dockerfile
          - image_name: file-server
            dockerfile: crates/services/autumn/Dockerfile
          - image_name: proxy
            dockerfile: crates/services/january/Dockerfile
          - image_name: gifbox
            dockerfile: crates/services/gifbox/Dockerfile
          - image_name: crond
            dockerfile: crates/daemons/crond/Dockerfile
          - image_name: pushd
            dockerfile: crates/daemons/pushd/Dockerfile
          - image_name: voice-ingress
            dockerfile: crates/daemons/voice-ingress/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built crate binaries
        uses: actions/download-artifact@v4
        with:
          name: crate-binaries
          path: ci-bin/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,scope=${{ matrix.image_name }},mode=max

  publish:
    name: Publish Docker images
    if: github.event_name != 'pull_request'
    needs:
      - build-crates
    runs-on: [self-hosted, cs-003]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: base
            dockerfile: Dockerfile
          - image_name: api
            dockerfile: crates/delta/Dockerfile
          - image_name: events
            dockerfile: crates/bonfire/Dockerfile
          - image_name: file-server
            dockerfile: crates/services/autumn/Dockerfile
          - image_name: proxy
            dockerfile: crates/services/january/Dockerfile
          - image_name: gifbox
            dockerfile: crates/services/gifbox/Dockerfile
          - image_name: crond
            dockerfile: crates/daemons/crond/Dockerfile
          - image_name: pushd
            dockerfile: crates/daemons/pushd/Dockerfile
          - image_name: voice-ingress
            dockerfile: crates/daemons/voice-ingress/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built crate binaries
        uses: actions/download-artifact@v4
        with:
          name: crate-binaries
          path: ci-bin/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,scope=${{ matrix.image_name }},mode=max
