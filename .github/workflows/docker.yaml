name: Docker Build and Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  CARGO_TERM_COLOR: always

jobs:
  build-crates:
    name: Install requirements and build crates from scratch
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Mise
        uses: immich-app/devtools/actions/use-mise@cd24790a7f5f6439ac32cc94f5523cb2de8bfa8c # use-mise-action-v1.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain and requirements
        run: mise install

      - name: Build crates from scratch
        shell: bash
        run: |
          set -euo pipefail
          cargo clean
          mise build

  build-pr:
    name: Build Docker images (no push)
    if: github.event_name == 'pull_request'
    needs:
      - build-crates
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: base
            dockerfile: Dockerfile
          - image_name: api
            dockerfile: crates/delta/Dockerfile
          - image_name: events
            dockerfile: crates/bonfire/Dockerfile
          - image_name: file-server
            dockerfile: crates/services/autumn/Dockerfile
          - image_name: proxy
            dockerfile: crates/services/january/Dockerfile
          - image_name: gifbox
            dockerfile: crates/services/gifbox/Dockerfile
          - image_name: crond
            dockerfile: crates/daemons/crond/Dockerfile
          - image_name: pushd
            dockerfile: crates/daemons/pushd/Dockerfile
          - image_name: voice-ingress
            dockerfile: crates/daemons/voice-ingress/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}:pr-${{ github.event.pull_request.number }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/base:latest
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,scope=${{ matrix.image_name }},mode=max

  publish-base:
    name: Publish base image
    if: github.event_name != 'pull_request'
    needs:
      - build-crates
    runs-on: self-hosted
    outputs:
      base_image_ref: ${{ steps.export-ref.outputs.base_image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (base)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/base
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push base image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

      - name: Export base image digest reference
        id: export-ref
        run: echo "base_image_ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/base@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  publish-services:
    name: Publish service images
    if: github.event_name != 'pull_request'
    runs-on: self-hosted
    needs:
      - publish-base
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: api
            dockerfile: crates/delta/Dockerfile
          - image_name: events
            dockerfile: crates/bonfire/Dockerfile
          - image_name: file-server
            dockerfile: crates/services/autumn/Dockerfile
          - image_name: proxy
            dockerfile: crates/services/january/Dockerfile
          - image_name: gifbox
            dockerfile: crates/services/gifbox/Dockerfile
          - image_name: crond
            dockerfile: crates/daemons/crond/Dockerfile
          - image_name: pushd
            dockerfile: crates/daemons/pushd/Dockerfile
          - image_name: voice-ingress
            dockerfile: crates/daemons/voice-ingress/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ needs.publish-base.outputs.base_image_ref }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,scope=${{ matrix.image_name }},mode=max
