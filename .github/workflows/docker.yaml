concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true
name: Docker Build and Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  CARGO_TERM_COLOR: always

jobs:
  build-and-publish:
    name: Build and (optionally) Publish Docker images
    runs-on: [ubuntu-latest]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: base
            dockerfile: Dockerfile
          - image_name: api
            dockerfile: crates/delta/Dockerfile
          - image_name: events
            dockerfile: crates/bonfire/Dockerfile
          - image_name: file-server
            dockerfile: crates/services/autumn/Dockerfile
          - image_name: proxy
            dockerfile: crates/services/january/Dockerfile
          - image_name: gifbox
            dockerfile: crates/services/gifbox/Dockerfile
          - image_name: crond
            dockerfile: crates/daemons/crond/Dockerfile
          - image_name: pushd
            dockerfile: crates/daemons/pushd/Dockerfile
          - image_name: voice-ingress
            dockerfile: crates/daemons/voice-ingress/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build crates from scratch (Debian 12 + rustup)
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD":/work \
            -w /work \
            -e CARGO_HOME=/work/.cargo \
            -e RUSTUP_HOME=/work/.rustup \
            debian:12 \
            bash -lc '
              set -euo pipefail
              apt-get update
              env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                build-essential \
                curl \
                clang \
                cmake \
                pkg-config \
                libssl-dev \
                protobuf-compiler \
                ca-certificates
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain 1.92.0
              . "$HOME/.cargo/env"
              cargo --version
              cargo clean
              cargo build --release --bins
            '

      - name: Package built binaries
        shell: bash
        run: |
          set -euo pipefail

          BIN_DIR=""
          if compgen -G "target/release/revolt-*" >/dev/null; then
            BIN_DIR="target/release"
          elif compgen -G "target/debug/revolt-*" >/dev/null; then
            BIN_DIR="target/debug"
          else
            echo "No built revolt-* binaries found under target/release or target/debug"
            exit 1
          fi

          echo "Packaging binaries from ${BIN_DIR}"
          mkdir -p ci-bin
          install -m 0755 "${BIN_DIR}"/revolt-* ci-bin/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and (optionally) push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ github.event_name != 'pull_request' && steps.meta.outputs.tags || format('{0}/{1}/{2}:pr-{3}', env.REGISTRY, env.IMAGE_NAMESPACE, matrix.image_name, github.event.pull_request.number) }}
          labels: ${{ github.event_name != 'pull_request' && steps.meta.outputs.labels || '' }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,scope=${{ matrix.image_name }},mode=max
